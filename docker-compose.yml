services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: org_structure
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d org_structure"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/org_structure
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head
    volumes:
      - .:/app

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/org_structure
      LOG_LEVEL: INFO
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - .:/app

volumes:
  postgres_data:
